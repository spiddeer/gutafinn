name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Verify offline build artifacts
        run: |
          test -s dist/sw.js
          test -s dist/manifest.webmanifest
          test -s dist/pwa/icon-192.png
          test -s dist/pwa/icon-512.png

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test

  cms:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cms/package-lock.json
      - run: npm ci
      - run: npm test

  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci --prefix backend
      - run: npm ci --prefix cms
      - name: Initialize domain database through backend
        run: DB_PATH="$RUNNER_TEMP/places.db" node -e "require('./backend/db').db.close()"
      - name: Open initialized database through CMS
        run: >-
          DATABASE_PATH="$RUNNER_TEMP/places.db" node --input-type=module -e
          "import { openDatabase } from './cms/src/db.js';
          const store = openDatabase(process.env.DATABASE_PATH);
          if (store.categories().length !== 8) process.exit(1);
          store.close();"
      - name: Validate Compose files
        run: |
          docker compose -f docker-compose.yml config -q
          cp deploy/proxmox/.env.example deploy/proxmox/.env
          docker compose -f deploy/proxmox/docker-compose.yml config -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build frontend image
        run: docker build -t gutafinn-web-ci -f deploy/Dockerfile .
      - name: Validate deployed Nginx configuration
        run: |
          cmp deploy/nginx.conf deploy/proxmox/nginx.conf
          docker run --rm \
            --add-host backend:127.0.0.1 \
            --add-host cms:127.0.0.1 \
            -v "$PWD/deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro" \
            gutafinn-web-ci nginx -t
      - name: Build backend image
        run: docker build -t gutafinn-backend-ci -f backend/Dockerfile backend
      - name: Build CMS image
        run: docker build -t gutafinn-cms-ci -f cms/Dockerfile cms
      - name: Smoke shared SQLite runtime
        shell: bash
        run: |
          set -euo pipefail
          cleanup() {
            docker rm -f gutafinn-cms-ci gutafinn-backend-ci >/dev/null 2>&1 || true
            docker volume rm gutafinn-data-ci >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          docker volume create gutafinn-data-ci
          docker run -d --name gutafinn-backend-ci \
            -v gutafinn-data-ci:/data gutafinn-backend-ci
          for attempt in {1..30}; do
            if [[ "$(docker inspect -f '{{.State.Health.Status}}' gutafinn-backend-ci)" == healthy ]]; then
              break
            fi
            if [[ "$attempt" == 30 ]]; then
              docker logs gutafinn-backend-ci
              exit 1
            fi
            sleep 1
          done
          docker run -d --name gutafinn-cms-ci \
            -e DATABASE_PATH=/data/places.db \
            -e ADMIN_PASSWORD=ci-password \
            -e SESSION_SECRET=ci-session-secret-with-at-least-thirty-two-characters \
            -e PASSKEY_RP_ID=cms.example.test \
            -e PASSKEY_ORIGIN=https://cms.example.test \
            -v gutafinn-data-ci:/data gutafinn-cms-ci
          for attempt in {1..30}; do
            if [[ "$(docker inspect -f '{{.State.Health.Status}}' gutafinn-cms-ci)" == healthy ]]; then
              exit 0
            fi
            if [[ "$attempt" == 30 ]]; then
              docker logs gutafinn-cms-ci
              exit 1
            fi
            sleep 1
          done
