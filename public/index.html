<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1b5e73" />
  <title>Gotlandsguiden</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <!-- Leaflet.markercluster – grupperar närliggande markörer -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    integrity="sha384-pmjIAcz2bAn0xukfxADbZIb3t8oRT9Sv0rvO+BR5Csr6Dhqq+nZs59P0pPKQJkEV"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    integrity="sha384-wgw+aLYNQ7dlhK47ZPK7FRACiq7ROZwgFNg0m04avm4CaXS+Z9Y7nMu8yNjBKYC+"
    crossorigin="anonymous"
  />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Kartan tar övre halvan (hela på mobil) -->
    <div id="map"></div>

    <!-- Mörkt läge-toggle -->
    <button id="dark-btn" class="dark-btn" type="button" title="Växla mörkt läge" aria-label="Växla mörkt läge" aria-pressed="false">🌙</button>

    <!-- Flytande knapp för att centrera på användarens position -->
    <button id="locate-btn" class="locate-btn" type="button" title="Hitta mig" aria-label="Centrera kartan på min position">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path fill="currentColor" d="M12 8a4 4 0 100 8 4 4 0 000-8zm0 6a2 2 0 110-4 2 2 0 010 4zm9-3h-2.06A7.01 7.01 0 0013 5.06V3h-2v2.06A7.01 7.01 0 005.06 11H3v2h2.06A7.01 7.01 0 0011 18.94V21h2v-2.06A7.01 7.01 0 0018.94 13H21v-2zm-9 6a5 5 0 110-10 5 5 0 010 10z"/>
      </svg>
    </button>

    <!-- Innehållspanel: overlay på mobil, undre halva på större skärmar -->
    <section id="content-panel" aria-label="Platser">
      <div class="panel-handle" aria-hidden="true"></div>

      <header class="panel-header">
        <h1>Gotlandsguiden</h1>
        <p id="status" class="status">Söker din position…</p>
      </header>

      <div class="search-wrap">
        <input
          id="search-input"
          class="search-input"
          type="search"
          placeholder="Sök plats…"
          aria-label="Sök plats"
          autocomplete="off"
        />
      </div>

      <nav id="filter-bar" class="filter-bar" aria-label="Filtrera kategorier">
        <!-- Filter-chips fylls i via JS -->
      </nav>

      <div class="panel-body">
        <h2 class="section-title" id="list-title">Platser nära dig</h2>
        <ul id="places-list" class="places-list">
          <!-- Platser fylls på via JS -->
          <li class="place-placeholder">Laddar platser…</li>
        </ul>
      </div>
    </section>

    <!-- Detaljvy (slide-up) för en enskild plats -->
    <div id="detail-sheet" class="detail-sheet" role="dialog" aria-modal="true" aria-labelledby="detail-name" hidden>
      <div class="detail-card">
        <button id="detail-close" class="detail-close" type="button" aria-label="Stäng">&times;</button>
        <div class="detail-content">
          <!-- Fylls via JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script
    src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"
    integrity="sha384-eXVCORTRlv4FUUgS/xmOyr66XBVraen8ATNLMESp92FKXLAMiKkerixTiBvXriZr"
    crossorigin="anonymous"
  ></script>

  <script src="js/places-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
