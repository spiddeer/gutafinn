services:
  backend:
    build: ./backend
    container_name: gutafinn_api
    restart: unless-stopped
    environment:
      - DB_PATH=/data/places.db
      - PORT=8080
      - API_KEY=${API_KEY:-}
    volumes:
      - ./data:/data

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: gutafinn_web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      cms:
        condition: service_healthy
    ports:
      - "3003:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  cms:
    build: ./cms
    container_name: gutafinn_cms
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - DATABASE_PATH=/data/places.db
      - PORT=3000
      - HOST=0.0.0.0
      - NODE_ENV=production
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - PASSKEY_RP_ID=${PASSKEY_RP_ID:-}
      - PASSKEY_ORIGIN=${PASSKEY_ORIGIN:-}
      - PASSKEY_RP_NAME=${PASSKEY_RP_NAME:-Gutafinn CMS}
      - SIGNUP_CODE=${SIGNUP_CODE:-}
      - SECURE_COOKIES=${SECURE_COOKIES:-true}
    volumes:
      - ./data:/data
