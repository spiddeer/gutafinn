<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gutafinn - Overraska mig</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&amp;family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --background: oklch(0.975 0.012 80);
        --foreground: oklch(0.245 0.025 64);
        --card: oklch(0.995 0.007 82);
        --primary: oklch(0.32 0.06 220);
        --primary-foreground: oklch(0.985 0.006 80);
        --muted: oklch(0.943 0.018 80);
        --muted-foreground: oklch(0.49 0.028 65);
        --border: oklch(0.865 0.024 77);
        --sea: oklch(0.56 0.075 218);
        --sand: oklch(0.91 0.055 82);
        --sand-foreground: oklch(0.28 0.035 68);
        --poppy: oklch(0.68 0.18 35);
        --poppy-foreground: oklch(0.18 0.035 35);
        --ring: oklch(0.57 0.075 218);
        --shadow: 0 22px 54px oklch(0.22 0.04 220 / 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 50% 0%, oklch(0.93 0.035 80 / 0.72), transparent 34rem),
          var(--background);
        color: var(--foreground);
        font-family: "Inter", system-ui, sans-serif;
      }

      button {
        min-height: 44px;
        border: 0;
        font: inherit;
        cursor: pointer;
      }

      button:focus-visible {
        outline: 3px solid color-mix(in oklch, var(--ring) 55%, transparent);
        outline-offset: 3px;
      }

      .app {
        width: min(100%, 440px);
        min-height: 100vh;
        margin-inline: auto;
        padding: calc(1rem + env(safe-area-inset-top)) 20px
          calc(2rem + env(safe-area-inset-bottom));
        background: var(--background);
        box-shadow: var(--shadow);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .icon-button {
        width: 44px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--card);
        color: var(--primary);
        font-size: 1.25rem;
      }

      .eyebrow {
        margin: 0;
        color: var(--sea);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      h1,
      h2 {
        font-family: "Fraunces", Georgia, serif;
      }

      h1 {
        margin: 1.2rem 0 0;
        color: var(--primary);
        font-size: clamp(2.2rem, 11vw, 3rem);
        line-height: 0.98;
        letter-spacing: -0.035em;
      }

      .lead {
        max-width: 34ch;
        margin: 0.8rem 0 1.6rem;
        color: var(--muted-foreground);
        font-size: 0.95rem;
        line-height: 1.55;
      }

      .control-label {
        display: block;
        margin: 0 0 0.65rem;
        color: var(--primary);
        font-size: 0.8rem;
        font-weight: 700;
      }

      .choice-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.5rem;
        margin-bottom: 1rem;
      }

      .choice {
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--card);
        color: var(--muted-foreground);
        font-size: 0.78rem;
        font-weight: 700;
      }

      .choice[aria-pressed="true"] {
        border-color: var(--primary);
        background: var(--primary);
        color: var(--primary-foreground);
      }

      .adventure {
        overflow: hidden;
        margin-top: 1.5rem;
        border: 1px solid var(--border);
        border-radius: 1.75rem;
        background: var(--card);
        box-shadow: var(--shadow);
      }

      .photo {
        position: relative;
        height: 220px;
        overflow: hidden;
      }

      .photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .photo::after {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, oklch(0.16 0.035 220 / 0.68), transparent 60%);
        content: "";
        pointer-events: none;
      }

      .mood-label {
        position: absolute;
        z-index: 1;
        right: 1rem;
        bottom: 0.8rem;
        margin: 0;
        color: white;
        font-size: 0.68rem;
        font-weight: 600;
      }

      .card-body {
        padding: 1.25rem;
      }

      .card-head {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 1rem;
      }

      h2 {
        margin: 0.25rem 0 0;
        color: var(--primary);
        font-size: 1.75rem;
        line-height: 1.05;
      }

      .distance {
        flex: 0 0 auto;
        min-height: 36px;
        padding: 0.6rem 0.8rem;
        border-radius: 999px;
        background: var(--sand);
        color: var(--sand-foreground);
        font-size: 0.72rem;
        font-weight: 800;
      }

      .reasons {
        display: grid;
        gap: 0.6rem;
        margin: 1rem 0 1.2rem;
        padding: 0;
        list-style: none;
      }

      .reason {
        display: flex;
        min-height: 44px;
        align-items: center;
        gap: 0.65rem;
        padding: 0.7rem 0.85rem;
        border-radius: 0.9rem;
        background: var(--muted);
        color: var(--foreground);
        font-size: 0.82rem;
        font-weight: 650;
      }

      .reason span {
        display: grid;
        width: 28px;
        height: 28px;
        flex: 0 0 auto;
        place-items: center;
        border-radius: 999px;
        background: var(--card);
        color: var(--primary);
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.65rem;
      }

      .primary-action {
        border-radius: 0.9rem;
        background: var(--poppy);
        color: var(--poppy-foreground);
        font-weight: 800;
      }

      .secondary-action {
        min-width: 52px;
        border: 1px solid var(--border);
        border-radius: 0.9rem;
        background: var(--card);
        color: var(--primary);
        font-size: 1.2rem;
      }

      .change-link {
        display: block;
        width: 100%;
        margin-top: 0.8rem;
        background: transparent;
        color: var(--primary);
        font-size: 0.78rem;
        font-weight: 700;
        text-decoration: underline;
        text-underline-offset: 0.2rem;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <button class="icon-button" type="button" aria-label="Tillbaka">&larr;</button>
        <p class="eyebrow">Gutafinn</p>
        <span aria-hidden="true" style="width: 44px"></span>
      </header>

      <h1>&Ouml;verraska<br /><em>mig.</em></h1>
      <p class="lead">Hur mycket tid har du? Vi hittar ett ov&auml;ntat stopp n&auml;ra dig.</p>

      <section aria-labelledby="time-label">
        <p class="control-label" id="time-label">Jag har</p>
        <div class="choice-row" role="group" aria-labelledby="time-label">
          <button class="choice" type="button" aria-pressed="true">30 min</button>
          <button class="choice" type="button" aria-pressed="false">1&ndash;2 timmar</button>
          <button class="choice" type="button" aria-pressed="false">Halvdag</button>
        </div>
      </section>

      <section aria-labelledby="travel-label">
        <p class="control-label" id="travel-label">Jag tar mig fram</p>
        <div class="choice-row" role="group" aria-labelledby="travel-label">
          <button class="choice" type="button" aria-pressed="true">Till fots</button>
          <button class="choice" type="button" aria-pressed="false">Cykel</button>
          <button class="choice" type="button" aria-pressed="false">Bil</button>
        </div>
      </section>

      <article class="adventure" aria-labelledby="adventure-title">
        <div class="photo">
          <img
            src="../../../../src/assets/raukar-sea.webp"
            alt="St&auml;mningsbild av gotl&auml;ndsk kust och raukar"
          />
          <p class="mood-label">St&auml;mningsbild fr&aring;n Gotland</p>
        </div>
        <div class="card-body">
          <div class="card-head">
            <div>
              <p class="eyebrow">Ditt lilla &auml;ventyr</p>
              <h2 id="adventure-title">Folhammars naturreservat</h2>
            </div>
            <span class="distance">9 min</span>
          </div>

          <ul class="reasons" aria-label="D&auml;rf&ouml;r visas tipset">
            <li class="reason"><span aria-hidden="true">1</span>1,2 km bort till fots</li>
            <li class="reason"><span aria-hidden="true">2</span>En kategori du inte sett nyligen</li>
          </ul>

          <div class="actions">
            <button class="primary-action" type="button">Ta mig dit</button>
            <button class="secondary-action" type="button" aria-label="Visa ett annat tips">
              &orarr;
            </button>
          </div>
          <button class="change-link" type="button">&Auml;ndra tid eller f&auml;rds&auml;tt</button>
        </div>
      </article>
    </main>
  </body>
</html>
