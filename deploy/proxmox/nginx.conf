server {
    listen 80 default_server;
    server_name gutafinn.tobtech.se _;

    root /usr/share/nginx/html;
    index index.html;
    include /etc/nginx/snippets/nginx-public-headers.conf;

    gzip on;
    gzip_vary on;
    gzip_types application/javascript application/json image/svg+xml text/css;

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* ^/assets/.*\.(?:css|js|webp|svg|png|jpe?g|woff2)$ {
        include /etc/nginx/snippets/nginx-public-headers.conf;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        include /etc/nginx/snippets/nginx-public-headers.conf;
        add_header Cache-Control "no-cache";
    }

    location = /favicon.ico {
        return 404;
    }

    location = /sw.js {
        include /etc/nginx/snippets/nginx-public-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /manifest.webmanifest {
        include /etc/nginx/snippets/nginx-public-headers.conf;
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name gotland.tobtech.se;

    return 308 https://gutafinn.tobtech.se$request_uri;
}

server {
    listen 80;
    server_name gutafinn-admin.tobtech.se;
    include /etc/nginx/snippets/nginx-admin-headers.conf;

    # Passkey admin CMS (gutafinn_cms). Same nginx / port as the public site,
    # selected by Host header. Single-level subdomain (not admin.gutafinn.tobtech.se)
    # so it rides the free Universal SSL wildcard (*.tobtech.se) instead of needing
    # Total TLS / paid Advanced Certificate Manager for a nested subdomain.
    location / {
        proxy_pass http://cms:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
