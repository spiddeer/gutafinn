services:
  backend:
    build:
      context: ../../backend
    container_name: gutafinn_api
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      - DB_PATH=/data/places.db
      - PORT=8080
    volumes:
      - ./data:/data

  web:
    build:
      context: ../..
      dockerfile: deploy/Dockerfile
    container_name: gutafinn_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-3003}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
