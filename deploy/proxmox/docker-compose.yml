services:
  backend:
    build:
      context: ../../backend
    container_name: gotlandsguiden_api
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      - DB_PATH=/data/places.db
      - PORT=8080
    volumes:
      - ./data:/data

  web:
    image: nginx:alpine
    container_name: gotlandsguiden_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-3003}:80"
    volumes:
      - ../../public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
